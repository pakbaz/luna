<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna 🌙</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Top: Orbital View -->
    <div class="orbital-panel canvas-wrap">
      <canvas id="orbitalCanvas"></canvas>
    </div>

    <!-- Middle: Moon Phase (left) + Earth Sky View (right) -->
    <div class="bottom-panels">
      <div class="canvas-wrap">
        <canvas id="phaseCanvas"></canvas>
      </div>
      <div class="canvas-wrap">
        <canvas id="skyCanvas"></canvas>
      </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls">
      <button id="playPauseBtn" class="play-btn" aria-label="Pause">⏸️</button>

      <div class="slider-area">
        <div class="slider-row">
          <span class="emoji">🐢</span>
          <input type="range" id="speedSlider" min="0.05" max="2" step="0.05" value="0.5">
          <span class="emoji">🐇</span>
        </div>
        <div id="phaseLabel" class="phase-label">🌑  Moon is Hiding!</div>
        <div id="timeLabel" class="time-label">☀️ Day  12:00</div>
      </div>

      <div class="speed-display">
        <span id="speedLabel" class="speed-value">0.5x</span>
        <span class="speed-unit">speed</span>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
